<!DOCTYPE html>
<html lang="it">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Cucina App — Ricette, Bimby &amp; Timer</title>

  <!-- PWA -->
  <link rel="manifest" href="manifest.json" />
  <meta name="theme-color" content="#1D9E75" />

  <!-- iOS PWA -->
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
  <meta name="apple-mobile-web-app-title" content="Cucina" />
  <link rel="apple-touch-icon" href="icons/icon-192.svg" />

  <link rel="stylesheet" href="css/style.css" />
  <link rel="icon" href="icons/icon-192.svg" type="image/svg+xml" />
</head>
<body>

  <header class="app-header">
    <span class="app-logo">🍳</span>
    <h1>Cucina App</h1>
    <div class="header-right">
      <span class="app-sub" data-i18n="app_subtitle">Ricette · Bimby TM5 · Timer</span>
      <select id="lang-select" onchange="setLanguage(this.value)" aria-label="Language">
        <option value="it">🇮🇹 IT</option>
        <option value="en">🇬🇧 EN</option>
        <option value="de">🇩🇪 DE</option>
        <option value="fr">🇫🇷 FR</option>
        <option value="es">🇪🇸 ES</option>
      </select>
    </div>
  </header>

  <main class="app">

    <nav class="tabs" role="tablist">
      <button class="tab active" role="tab" aria-selected="true"
        onclick="showTab('saved',this)"  data-i18n="nav_recipebook">📚 Ricettario</button>
      <button class="tab"        role="tab" aria-selected="false"
        onclick="showTab('import',this)" data-i18n="nav_import">＋ Importa</button>
      <button class="tab"        role="tab" aria-selected="false"
        onclick="showTab('builtin',this)" data-i18n="nav_recipes">🍝 Ricette</button>
      <button class="tab"        role="tab" aria-selected="false"
        onclick="showTab('timer',this)"  data-i18n="nav_timer">⏱ Timer</button>
    </nav>

    <!-- ======================== RICETTARIO ======================== -->
    <section class="panel active" id="panel-saved" role="tabpanel">
      <div id="saved-list-view">
        <div class="saved-header">
          <input type="text" id="saved-search"
            data-i18n-placeholder="recipebook_search"
            placeholder="Cerca nel tuo ricettario…"
            oninput="renderRecipeBook()" />
          <span id="saved-count" class="muted-label"></span>
        </div>
        <div id="saved-source-filter"></div>
        <div id="saved-results-count" class="results-count"></div>
        <div class="ricette-grid" id="saved-grid"></div>
      </div>
      <div id="saved-detail-view" style="display:none"></div>
    </section>

    <!-- ======================== IMPORTA ======================== -->
    <section class="panel" id="panel-import" role="tabpanel">
      <div class="import-box card">
        <h2 data-i18n="import_title">Importa una ricetta da link</h2>
        <p class="muted-label" style="margin-bottom:12px"
          data-i18n="import_desc">
          Incolla il link di un video YouTube, TikTok, Instagram o di qualsiasi sito di ricette.
        </p>
        <div class="source-pills">
          <span class="src-pill yt">YouTube</span>
          <span class="src-pill tt">TikTok</span>
          <span class="src-pill ig">Instagram</span>
          <span class="src-pill web">Web</span>
        </div>
        <div class="url-row">
          <input type="url" id="url-input"
            data-i18n-placeholder="import_placeholder"
            placeholder="https://www.youtube.com/watch?v=…" />
          <button class="btn-primary" id="btn-import-go"
            onclick="importRecipe()"
            data-i18n="import_btn">Importa ricetta</button>
        </div>
        <div class="status-msg" id="import-status"></div>
      </div>

      <div class="preview-box card" id="preview-box" style="display:none">
        <h3 id="preview-title"></h3>
        <p id="preview-meta" class="muted-label" style="margin-bottom:12px"></p>
        <div class="sec-label" data-i18n="detail_ingredients">Ingredienti</div>
        <ul class="ing-list" id="preview-ing"></ul>
        <div class="sec-label" style="margin-top:1rem" data-i18n="detail_steps">Procedimento</div>
        <div id="preview-steps"></div>
        <div class="preview-actions">
          <button class="btn-primary" onclick="savePreviewed()"
            data-i18n="import_save">Salva nel ricettario</button>
          <button class="btn-ghost"   onclick="discardPreview()"
            data-i18n="import_discard">Scarta</button>
        </div>
      </div>
    </section>

    <!-- ======================== RICETTE BUILT-IN ======================== -->
    <section class="panel" id="panel-builtin" role="tabpanel">
      <div id="builtin-toolbar">
        <div class="saved-header">
          <input type="text" id="builtin-search"
            data-i18n-placeholder="builtin_search"
            placeholder="Cerca…"
            oninput="renderBuiltinRecipes()" />
        </div>
        <div id="builtin-cats" class="filter-row source-pills"></div>
        <div id="builtin-filters"></div>
        <div id="builtin-results-count" class="results-count"></div>
      </div>
      <div class="ricette-grid" id="builtin-grid"></div>
      <div id="builtin-detail" style="display:none"></div>
    </section>

    <!-- ======================== TIMER ======================== -->
    <section class="panel" id="panel-timer" role="tabpanel">
      <div class="lbl-row">
        <span data-i18n="timer_label_name">Nome pietanza</span>
        <span data-i18n="timer_label_min">Min</span>
        <span data-i18n="timer_label_sec">Sec</span>
        <span></span>
      </div>
      <div class="add-row">
        <input type="text"   id="t-name"
          data-i18n-placeholder="timer_name_placeholder"
          placeholder="Pasta, Sugo, Arrosto…" />
        <input type="number" id="t-min"  min="0" max="999" value="5" />
        <input type="number" id="t-sec"  min="0" max="59"  value="0" />
        <button class="btn-primary" onclick="addTimer()"
          data-i18n="timer_add">+ Aggiungi</button>
      </div>
      <div style="margin-top:1rem">
        <div class="timer-grid" id="timer-grid"></div>
        <p class="empty" id="timer-empty"
          data-i18n="timer_empty">Nessun timer attivo. Aggiungine uno sopra!</p>
      </div>
    </section>

  </main>

  <script src="js/i18n.js"></script>
  <script src="js/data.js"></script>
  <script src="js/storage.js"></script>
  <script src="js/timer.js"></script>
  <script src="js/import.js"></script>
  <script src="js/ui.js"></script>
  <script src="js/app.js"></script>
</body>
</html>
